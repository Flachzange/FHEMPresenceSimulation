# PresenceSimulation â€“ real-world example configuration
#
# Based on a productive FHEM installation with 16 lighting devices
# and one TV-related device.
#
# All referenced FHEM devices, readings, commands, recipients, and
# blocking conditions must be adapted to the local installation.
#
# Ongoing training uses live FHEM events because trainingSource is not
# set and therefore defaults to "events". The configured DbLog device
# can additionally be used for manual imports.
#
# Verify the generated events in dry-run mode before enabling playback.

define PresenceSim PresenceSimulation

# Optional: do not write the module's diagnostic readings back to DbLog.
# Whether this is useful depends on the local DbLog configuration.
attr PresenceSim DbLogExclude .*

# DbLog device used for manual history imports.
# Setting dbLogDevice alone does not enable automatic daily imports.
attr PresenceSim dbLogDevice logdb

# Ground floor
attr PresenceSim device01 device=Lichtaktor_EG_Buero reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device02 device=Lichtaktor_EG_Buero_2 reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device03 device=Lichtaktor_EG_Esszimmer_Durchgang reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device04 device=Lichtaktor_EG_Esszimmer_Tisch reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device05 device=Lichtaktor_EG_Esszimmer_Wand reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device06 device=Lichtaktor_EG_Flur reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device07 device=Lichtaktor_EG_Kueche reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device08 device=Lichtaktor_EG_Kueche_Essen reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device09 device=Lichtaktor_EG_WZ_links reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device10 device=Lichtaktor_EG_WZ_rechts reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240

# Upper floor
attr PresenceSim device11 device=Lichtaktor_OG_Bad reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device12 device=Lichtaktor_OG_Flur reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device13 device=Lichtaktor_OG_Kinderzimmer_gross reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device14 device=Lichtaktor_OG_Kinderzimmer_klein reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240
attr PresenceSim device15 device=Lichtaktor_OG_Schlafzimmer reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240

# Attic
attr PresenceSim device16 device=Lichtaktor_DG reading=state onRegex=^on$ offRegex=^off$ onCommand=on offCommand=off minDuration=1 maxDuration=240

# Separate command and observation devices:
#
# PresenceSimulation sends cmd_1/cmd_2 to DOIF_PresenceSimulation_TV.
# The actual state is observed through KODI:state and is also used for
# live training, playback feedback, restart reconciliation, and DbLog imports.
attr PresenceSim device17 device=DOIF_PresenceSimulation_TV onCommand=cmd_1 offCommand=cmd_2 reading=state readingDevice=KODI onRegex=(?i:^(opened|connected)$) offRegex=(?i:^disconnected$) minDuration=1 maxDuration=240

# Forward every simulationEvent through the FHEM msg command.
# Replace @Bewohner with a locally configured recipient or recipient group.
attr PresenceSim eventFn msg @Bewohner msgPrio="" msgText="$EVENT"

# Globally block simulated starts when the measured brightness exceeds 800.
# The referenced device and threshold are installation-specific.
attr PresenceSim globalBlock01 [DOIF_Weather_Brightness:state] > 800

# Use the latest 60 completed days for the model and retain up to
# 90 completed days of raw history.
attr PresenceSim trainingDays 60
attr PresenceSim retentionDays 90

attr PresenceSim room Anwesenheit

# Suggested first steps
#
# Import existing DbLog history manually:
#   set PresenceSim importDbLog 60
#
# Inspect the imported data and model:
#   get PresenceSim importInfo
#   get PresenceSim modelInfo
#
# Start or continue live event training:
#   set PresenceSim mode training
#
# Test without sending real device commands:
#   set PresenceSim mode dryrun
#
# Enable real playback only after checking the dry-run events:
#   set PresenceSim mode playback
#
# Stop training or simulation:
#   set PresenceSim mode off
#
# To use daily automatic DbLog imports instead of live event training:
#   attr PresenceSim trainingSource dblog
